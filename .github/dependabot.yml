version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 10
    ignore:
      # @types/node's major is synchronized from .node-version by
      # `npm run sync-tracking-types` and verified in CI. Ignore majors so it
      # cannot run ahead of the runtime; minor/patch updates still flow.
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]
      # @types/jasmine's major is synchronized from jasmine-core by the same
      # command and CI check. Ignore majors so it cannot run ahead of jasmine-core.
      - dependency-name: "@types/jasmine"
        update-types: ["version-update:semver-major"]
      # @motherduck/wasm-client held at ^0.6.6: the duckdb-wasm connector
      # (packages/malloy-db-duckdb) is written against the old 0.6 API. The 0.8
      # "minor" reshaped the type exports / SpecialDuckDBValue — a 0.x minor that
      # breaks — so it broke the #2911 group build; latest is 1.5.3-r.2, so moving
      # it is a deliberate connector migration. No update-types = hold all
      # versions (matches the @dependabot ignore comment). See docs/dependency-management/CONTEXT.md.
      - dependency-name: "@motherduck/wasm-client"
      # vscode-textmate held at 9.0.0: our generateMonarchGrammar.ts deep-imports
      # internal paths (vscode-textmate/release/theme, /rawGrammar) and rule types
      # that 9.3.2 — an in-range MINOR — stopped exporting, breaking the
      # syntax-highlight codegen in #2911. Also exact-pinned in
      # malloy-syntax-highlight/package.json (^9.0.0 would resolve the breaker on a
      # fresh install). The real fix is issue #2918; see docs/dependency-management/CONTEXT.md.
      - dependency-name: "vscode-textmate"
      # snowflake-sdk is exact-pinned (2.3.1) in malloy-db-snowflake; ignore here
      # so Dependabot stops proposing bumps that would otherwise ride the
      # connectors group. Deliberate bumps happen by hand against live Snowflake
      # CI. See docs/dependency-management/CONTEXT.md.
      - dependency-name: "snowflake-sdk"
      # @databricks/sql exact-pinned (1.15.0) in malloy-db-databricks: 1.16.0 ships a
      # native Rust kernel (eight @databricks/databricks-sql-kernel-* .node binaries)
      # esbuild can't bundle, breaking the vscode-extension/malloy-cli builds. malloy's
      # own CI passes (plain Node loads .node), so it only breaks downstream at release;
      # #2888 pinned package.json but not here, so connectors-group #2934 re-bumped it
      # and it shipped in 0.0.418. Silent pin: only a security alert resurfaces it. See
      # docs/dependency-management/CONTEXT.md.
      - dependency-name: "@databricks/*"
      # vega-lite held at v5 (the renderer's Vega 5->6 upgrade is deferred). It's a
      # direct dep, so its major opens a recurring monthly PR; ignore the major so
      # it stops squatting the limit. v5 minors still flow. See docs/dependency-management/CONTEXT.md.
      - dependency-name: "vega-lite"
        update-types: ["version-update:semver-major"]
      # pg + pg-query-stream held: pg-query-stream pulls pg-cursor, which
      # deep-imports pg's internal lib/result.js. Bumping pg (8.7->8.22 in the
      # connectors group, #2923) skewed those versions and broke module resolution
      # in EVERY dialect's test suite (the shared harness loads the postgres path).
      # pg is also exact-pinned (8.7.3) in malloy-db-postgres/package.json since
      # ^8.7.1 would resolve the breaker on a fresh install. They're a coupled set
      # (pg/pg-cursor/pg-query-stream move together); the real fix is issue #2928.
      - dependency-name: "pg"
      - dependency-name: "pg-query-stream"
      # @google-cloud/bigquery + common + paginator held at v7/v5 (a coupled set).
      # bigquery 8 -> common 6 -> google-auth-library 10 -> gaxios 7, and gaxios 7
      # does an ESM-only dynamic import() that fails under jest without
      # --experimental-vm-modules; that flag can't be made invisible for
      # `npx jest FILE` and is experimental, so we hold v7. Pinned to best-v7 in
      # malloy-db-bigquery/package.json. Unpin per issue #2932 (jest->vitest, or
      # the ESM-only import going away).
      - dependency-name: "@google-cloud/bigquery"
      - dependency-name: "@google-cloud/common"
      - dependency-name: "@google-cloud/paginator"
      # uuid + @noble/hashes held below their ESM-only majors. uuid 12+ and
      # @noble/hashes 2+ dropped CommonJS (pure ESM), which breaks every downstream
      # consumer's esbuild bundle and ts-jest runtime — an ESM-only runtime dep leaks
      # downstream exactly like a native binary, so the core stays CJS. Held on the
      # last CJS majors (uuid ^11, @noble/hashes ^1) via caret ranges in
      # packages/malloy/package.json; ignore the MAJOR only so CJS-line minors/patches
      # still flow. See docs/dependency-management/CONTEXT.md.
      - dependency-name: "uuid"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@noble/hashes"
        update-types: ["version-update:semver-major"]
    groups:
      # Not for fragmentation (the per-platform node-bindings are transitive here,
      # so they never fan out). It's a deliberate callout: a duckdb bump has
      # downstream blast radius, so it gets its own PR to be merged on purpose
      # instead of buried in the monthly minor/patch pile.
      duckdb:
        patterns:
          - "@duckdb/*"
      toolchain:
        patterns:
          - "gts"
          - "typescript"
          - "eslint"
          - "eslint-*"
          - "@typescript-eslint/*"
          - "prettier"
        update-types:
          - "major"
      # Connector SDKs are high-blast-radius — native bits, dialect-specific, only
      # meaningfully verified against their live DB CI. Group them so any connector
      # bump lands as its own deliberate PR instead of riding the routine
      # minor/patch merge (which is how a @databricks/sql bump slipped in, and how
      # the motherduck/vscode-textmate breakers poisoned #2911). Held connectors
      # (snowflake-sdk, @motherduck/*) are also in the ignore list, so they won't
      # appear here. Placed before minor-and-patch so connector deps match here first.
      connectors:
        patterns:
          - "@google-cloud/*"
          - "@databricks/*"
          - "@prestodb/*"
          - "trino-client"
          - "snowflake-sdk"
          - "@motherduck/*"
          - "mysql2"
          - "pg"
          - "pg-query-stream"
      minor-and-patch:
        patterns:
          - "*"
        exclude-patterns:
          - "@duckdb/*"
        update-types:
          - "minor"
          - "patch"
