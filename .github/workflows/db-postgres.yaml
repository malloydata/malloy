name: 'DB:Postgres'
permissions: {}

on: workflow_call

jobs:
  test-postgres:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres
        env:
          POSTGRES_USER: root
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: workspace
      - name: Extract workspace
        run: tar --use-compress-program='zstd -d -T0' -xf workspace.tzst && rm workspace.tzst
      - name: Use Node.js 20.x
        uses: actions/setup-node@v5
        with:
          node-version: 24.x
      - name: Test
        run: |
          echo CREATE EXTENSION tsm_system_rows\; | psql
          gunzip -c test/data/postgres/malloytest-postgres.sql.gz | psql
          npm run ci-postgres
        env:
          PGHOST: localhost
          PGPORT: 5432
          PGUSER: root
          PGPASSWORD: postgres
