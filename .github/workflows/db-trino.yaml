name: 'DB:Trino'
permissions: {}

on:
  workflow_call:
    secrets:
      BQ_PRESTO_TRINO_KEY:
        required: true

jobs:
  test-trino:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: workspace
      - name: Extract workspace
        run: tar --use-compress-program='zstd -d -T0' -xf workspace.tzst && rm workspace.tzst
      - name: Use Node.js 20.x
        uses: actions/setup-node@v5
        with:
          node-version: 24.x
      - name: Test
        run: |
          ./test/trino/trino_start.sh
          npm run ci-trino
          ./test/trino/trino_stop.sh
        env:
          BQ_CREDENTIALS_KEY: ${{ secrets.BQ_PRESTO_TRINO_KEY }}
          TRINO_CATALOG: bigquery
          TRINO_SCHEMA: malloytest
          TRINO_SERVER: http://localhost:8080
          TRINO_USER: malloy-ci-bot@malloydata.org
