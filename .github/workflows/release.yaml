name: npmjs.com Release
permissions: {}

on: [workflow_dispatch]

jobs:
  pull_and_build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Use Node.js
        uses: actions/setup-node@v5
        with:
          node-version-file: '.node-version'
      - name: Install and build
        run: |
          npm --no-audit --no-fund ci --loglevel error
          npm run build
          npm run build-duckdb-db
      - name: Tar workspace
        run: tar --exclude='./.git' --use-compress-program='zstd -3 -T0' -cf /tmp/workspace.tzst .
      - uses: actions/upload-artifact@v7
        with:
          name: workspace
          path: /tmp/workspace.tzst
          retention-days: 1
          compression-level: 0

  precheck:
    needs: pull_and_build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: workspace
      - name: Extract workspace
        run: tar --use-compress-program='zstd -d -T0' -xf workspace.tzst && rm workspace.tzst
      - name: Use Node.js
        uses: actions/setup-node@v5
        with:
          node-version-file: '.node-version'
      - name: Precheck (dialect-agnostic tests + duckdb)
        run: npm run precheck

  npm-release:
    needs: precheck
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v5
        with:
          ssh-key: ${{ secrets.MALLOY_GHAPI }}
      - uses: actions/download-artifact@v8
        with:
          name: workspace
      - name: Extract workspace
        run: tar --use-compress-program='zstd -d -T0' -xf workspace.tzst && rm workspace.tzst
      - name: Use Node.js
        uses: actions/setup-node@v5
        with:
          node-version-file: '.node-version'
      - name: Upgrade npm for trusted publishing (OIDC)
        run: npm install -g npm@latest
      - name: Publish and bump version
        run: |
          # Configure git user
          git config --global user.email "malloy-ci-bot@malloydata.org"
          git config --global user.name "Malloy CI Bot"
          # Publish
          PACKAGES=$(jq -r '.workspaces.packages[]' ./package.json | xargs echo)
          echo Publishing $PACKAGES
          VERSION=$(jq -r .version ./lerna.json)
          # Accumulate a per-package table for the GitHub Actions run summary.
          echo "## 📦 npm Release Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Version**: \`$VERSION\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tag**: \`latest\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Package | Result |" >> "$GITHUB_STEP_SUMMARY"
          echo "| --- | --- |" >> "$GITHUB_STEP_SUMMARY"
          for package in $PACKAGES; do
            PKG_NAME=$(jq -r .name ./$package/package.json)
            if npm view "$PKG_NAME@$VERSION" version &>/dev/null; then
              echo "SKIPPED $PKG_NAME@$VERSION (already published)"
              echo "| \`$PKG_NAME\` | ⏭️ skipped (already published) |" >> "$GITHUB_STEP_SUMMARY"
            else
              echo Publishing $PKG_NAME $VERSION
              # MIT requires the license text to travel with the package. The
              # per-file headers are short SPDX tags, so copy the full LICENSE
              # into the package root (npm auto-bundles it). Kept out of git;
              # see .gitignore for packages/*/LICENSE.
              cp LICENSE "$package/LICENSE"
              npm publish -w $package --access=public
              echo "| [\`$PKG_NAME\`](https://www.npmjs.com/package/$PKG_NAME/v/$VERSION) | ✅ published |" >> "$GITHUB_STEP_SUMMARY"
            fi
          done
          echo "" >> "$GITHUB_STEP_SUMMARY"
          # Create GitHub Release with auto-generated notes from PRs
          if gh release view v$VERSION &>/dev/null; then
            echo "SKIPPED release v$VERSION (already exists)"
            echo "- **GitHub Release**: v$VERSION (already existed)" >> "$GITHUB_STEP_SUMMARY"
          else
            gh release create v$VERSION --generate-notes --title "v$VERSION"
            echo "- **GitHub Release**: [v$VERSION](https://github.com/malloydata/malloy/releases/tag/v$VERSION)" >> "$GITHUB_STEP_SUMMARY"
          fi
          # Bump version
          npx lerna version patch --exact --yes --no-push --no-git-tag-version
          # Fix up package-lock.json
          npm install
          npm run generate-version-file --workspace=packages/malloy
          VERSION=$(jq -r .version ./lerna.json)
          echo Updating to $VERSION
          # Push new version to github
          git commit -sam "Version $VERSION-dev [skip ci]"
          git pull --rebase origin $BRANCH_NAME
          git push origin $BRANCH_NAME
        env:
          CI: true
          BRANCH_NAME: main
          GH_TOKEN: ${{ github.token }}
