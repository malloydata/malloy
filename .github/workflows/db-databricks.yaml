name: 'DB:Databricks'
permissions: {}

on:
  workflow_call:
    secrets:
      DATABRICKS_HOST:
        required: true
      DATABRICKS_TOKEN:
        required: true
      DATABRICKS_WAREHOUSE_ID:
        required: true
  workflow_dispatch:

jobs:
  test-databricks:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - name: Use Node.js 20.x
        uses: actions/setup-node@v5
        with:
          node-version: 20.x
      - name: npm install, build, and test
        run: |
          npm ci --loglevel error
          npm run build
          npm run ci-databricks
        env:
          CI: true
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
          DATABRICKS_PATH: /sql/1.0/warehouses/${{ secrets.DATABRICKS_WAREHOUSE_ID }}
          DATABRICKS_CATALOG: malloy_ci
