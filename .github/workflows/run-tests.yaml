name: Malloy Tests
permissions: {}

# Runs the SECRET-BEARING half of CI: every job here needs repo secrets
# (cloud DB credentials, etc.), runs on pull_request_target, and is
# gated by check-permission. Each dialect job does its own checkout +
# build because we cannot safely share an artifact built from PR-head
# code in a workflow that exposes secrets (CodeQL: cache poisoning).
# The non-secret half is in pr-tests.yaml, which uses pull_request and
# can share a pull_and_build artifact safely.

on:
  workflow_dispatch:
  pull_request_target:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  check-permission:
    runs-on: ubuntu-latest
    steps:
      - name: Permission Check
        uses: malloydata/check-ci-permissions@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          username: ${{ github.triggering_actor }}
          error_message: |
            User does not have write access to this repository. Refer to CONTRIBUTING.md instructions on how to contribute to Malloy.

  # *** IMPORTANT ***
  # Every job below needs: check-permission. Adding a job without that
  # gate leaks secrets to fork-PR code.
  main:
    needs: check-permission
    uses: './.github/workflows/main.yaml'
    secrets:
      BIGQUERY_KEY: ${{ secrets.BIGQUERY_KEY }}
  db-trino:
    needs: check-permission
    uses: './.github/workflows/db-trino.yaml'
    secrets:
      BQ_PRESTO_TRINO_KEY: ${{ secrets.BQ_PRESTO_TRINO_KEY }}
  db-presto:
    needs: check-permission
    uses: './.github/workflows/db-presto.yaml'
    secrets:
      BQ_PRESTO_TRINO_KEY: ${{ secrets.BQ_PRESTO_TRINO_KEY }}
  db-bigquery:
    needs: check-permission
    uses: './.github/workflows/db-bigquery.yaml'
    secrets:
      BIGQUERY_KEY: ${{ secrets.BIGQUERY_KEY }}
  # db-motherduck:
  #   needs: check-permission
  #   uses: './.github/workflows/db-motherduck.yaml'
  #   secrets:
  #     MOTHERDUCK_TOKEN_10: ${{ secrets.MOTHERDUCK_TOKEN_10 }}
  db-snowflake:
    needs: check-permission
    uses: './.github/workflows/db-snowflake.yaml'
    secrets:
      SNOWFLAKE_CONNECTION: ${{ secrets.SNOWFLAKE_CONNECTION }}
  db-databricks:
    needs: check-permission
    uses: './.github/workflows/db-databricks.yaml'
    secrets:
      DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
      DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
      DATABRICKS_WAREHOUSE_ID: ${{ secrets.DATABRICKS_WAREHOUSE_ID }}

  malloy-tests:
    needs:
      - main
      - db-snowflake
      - db-bigquery
      - db-presto
      - db-trino
      # - db-motherduck
      - db-databricks
    runs-on: ubuntu-latest
    steps:
      - name: Success
        run: echo Success
