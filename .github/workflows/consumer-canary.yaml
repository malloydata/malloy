name: 'Consumer Canary'
permissions: {}

# Exercises the published @malloydata packages the way a downstream app does —
# esbuild-bundled for node, and loaded under a plain ts-jest config (no babel
# transform) — so a producer-green build can't ship a consumer-broken artifact.
# See test/consumer-canary/CONTEXT.md.
on: workflow_call

jobs:
  consumer-canary:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v8
        with:
          name: workspace
      - name: Extract workspace
        run: tar --use-compress-program='zstd -d -T0' -xf workspace.tzst && rm workspace.tzst
      - name: Use Node.js
        uses: actions/setup-node@v5
        with:
          node-version-file: '.node-version'
      - name: Consumer canary (bundle + plain ts-jest)
        run: npm run consumer-canary
        env:
          CI: true
