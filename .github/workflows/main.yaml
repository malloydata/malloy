# The "Core" job runs through all the tests which are not dialect specific.
# This includes tests which don't touch the database at all, and tests
# which touch some combination of duckdb,bigquery,postgres but do
# not need to be once times for each dialect.
name: Core
permissions: {}

on:
  workflow_call:
    secrets:
      BIGQUERY_KEY:
        required: true

jobs:
  main:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres
        env:
          POSTGRES_USER: root
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/download-artifact@v8
        with:
          name: workspace
      - name: Extract workspace
        run: tar --use-compress-program='zstd -d -T0' -xf workspace.tzst && rm workspace.tzst
      - name: Use Node.js 24.x
        uses: actions/setup-node@v5
        with:
          node-version: 24.x
      - name: GCloud auth
        uses: 'google-github-actions/auth@v3'
        with:
          credentials_json: '${{ secrets.BIGQUERY_KEY }}'
      - name: Lint and test
        run: |
          sh scripts/ci-test-sanity-check.sh
          sh scripts/ci-env-sanity-check.sh
          npm run lint
          echo CREATE EXTENSION tsm_system_rows\; | psql
          gunzip -c test/data/postgres/malloytest-postgres.sql.gz | psql
          npm run ci-core
        env:
          CI: true
          PGHOST: localhost
          PGPORT: 5432
          PGUSER: root
          PGPASSWORD: postgres
