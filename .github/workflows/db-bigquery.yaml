name: 'DB:BigQuery'
permissions: {}

on:
  workflow_call:
    secrets:
      BIGQUERY_KEY:
        required: true

jobs:
  test-bigquery:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: workspace
      - name: Extract workspace
        run: tar --use-compress-program='zstd -d -T0' -xf workspace.tzst && rm workspace.tzst
      - name: Use Node.js 24.x
        uses: actions/setup-node@v5
        with:
          node-version: 24.x
      - name: GCloud auth
        uses: 'google-github-actions/auth@v3'
        with:
          credentials_json: '${{ secrets.BIGQUERY_KEY }}'
      - name: Test
        run: npm run ci-bigquery
        env:
          CI: true
