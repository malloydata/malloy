name: 'DB:Snowflake'
permissions: {}

on:
  workflow_call:
    secrets:
      SNOW_CI_ACCOUNT:
        required: true
      SNOW_CI_KEY:
        required: true

jobs:
  test-snowflake:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v8
        with:
          name: workspace
      - name: Extract workspace
        run: tar --use-compress-program='zstd -d -T0' -xf workspace.tzst && rm workspace.tzst
      - name: Use Node.js
        uses: actions/setup-node@v5
        with:
          node-version-file: '.node-version'
      - name: Test
        run: npm run ci-snowflake
        env:
          CI: true
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOW_CI_ACCOUNT }}
          SNOWFLAKE_PRIVATE_KEY_RAW: ${{ secrets.SNOW_CI_KEY }}
          SNOWFLAKE_AUTHENTICATOR: SNOWFLAKE_JWT
          SNOWFLAKE_USER: MALLOY_CI
          SNOWFLAKE_ROLE: MALLOY_CI_ROLE
          SNOWFLAKE_WAREHOUSE: MALLOY_CI_WH
          SNOWFLAKE_DATABASE: MALLOYTEST
          SNOWFLAKE_SCHEMA: malloytest
