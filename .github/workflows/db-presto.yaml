name: 'DB:Presto'
permissions: {}

on:
  workflow_call:
    secrets:
      BQ_PRESTO_TRINO_KEY:
        required: true

jobs:
  test-presto:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: workspace
      - name: Extract workspace
        run: tar --use-compress-program='zstd -d -T0' -xf workspace.tzst && rm workspace.tzst
      - name: Use Node.js 24.x
        uses: actions/setup-node@v5
        with:
          node-version: 24.x
      - name: Test
        run: |
          ./test/presto/presto_start.sh --slim
          npm run ci-presto
          ./test/presto/presto_stop.sh
        env:
          BQ_CREDENTIALS_KEY: ${{ secrets.BQ_PRESTO_TRINO_KEY }}
          PRESTO_CATALOG: bigquery
          PRESTO_SCHEMA: malloytest
          PRESTO_HOST: http://localhost
          PRESTO_PORT: 8080
          PRESTO_USER: malloy-ci-bot@malloydata.org
