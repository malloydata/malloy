name: Bug report
description: Something not working in Malloy? Tell us about it.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Have a usage question rather than a bug? The [Slack](https://malloydata.github.io/slack) is usually faster than an issue.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What were you trying to do, and what went wrong?
    validations:
      required: true

  - type: textarea
    id: malloy-source
    attributes:
      label: Malloy source (if applicable)
      description: A short `.malloy` snippet that reproduces the issue. This is the single most helpful thing you can include.
      render: text

  - type: dropdown
    id: backend
    attributes:
      label: Database backend
      options:
        - DuckDB
        - BigQuery
        - Snowflake
        - PostgreSQL
        - MySQL
        - Trino / Presto
        - Databricks
        - DuckDB WASM (browser)
        - Not applicable / compiler only
        - Other

  - type: input
    id: version
    attributes:
      label: Malloy version (if known)
      placeholder: "@malloydata/malloy 0.x.y"
