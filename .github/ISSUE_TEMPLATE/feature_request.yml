name: Feature request
description: Suggest an improvement to Malloy.
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        For larger language-design ideas, [open a Discussion](https://github.com/malloydata/malloy/discussions/new?category=ideas) or a [What's Next proposal](https://github.com/malloydata/whatsnext) — they get more visibility than an issue.

  - type: textarea
    id: idea
    attributes:
      label: What's the idea?
      description: What can't you do today, or what would you like to be able to do?
    validations:
      required: true
