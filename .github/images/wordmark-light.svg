<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 220" role="img" aria-labelledby="malloy-wordmark-title">
  <title id="malloy-wordmark-title">Malloy</title>

  <!-- M mark: 4 interlaced rope strokes, faithful to the brand logo. Base 400x280, scaled 0.5 -> visible ~160x134. -->
  <g transform="translate(339, 40) scale(0.5)" stroke-width="66" stroke-linecap="round" fill="none">
    <path d="M 48 243 L 115 45"  stroke="#0F6FA8"/>
    <path d="M 155 37 L 240 244" stroke="#11B5CB"/>
    <path d="M 153 244 L 235 37" stroke="#E5701B"/>
    <path d="M 291 61 L 347 243" stroke="#F8B800"/>
  </g>

  <!-- Wordmark -->
  <text x="571" y="148"
        font-family="'Google Sans','Helvetica Neue','Arial',sans-serif"
        font-size="96"
        font-weight="500"
        letter-spacing="-2"
        fill="#1F2328">Malloy</text>
</svg>
